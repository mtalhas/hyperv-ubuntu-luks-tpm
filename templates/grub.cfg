# Boot menu used by the rebuilt install image.
# The first entry runs the unattended install by pointing the installer at the
# answer files placed in /autoinstall on the same disc. A short timeout means no
# key press is needed. The plain installer entry is kept as a manual fallback.
set timeout=5
loadfont unicode
set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

menuentry "Automated install" {
    set gfxpayload=keep
    # modprobe.blacklist=zfs reduces a known random kernel fault in overlayfs
    # during the install image extract on recent kernels. It applies to the
    # installer only, before the ---, not to the installed system. The build also
    # retries the install, which clears the rest of the randomness.
    linux  /casper/vmlinuz autoinstall ds=nocloud\;s=/cdrom/autoinstall/ modprobe.blacklist=zfs ---
    initrd /casper/initrd
}
menuentry "Manual install" {
    set gfxpayload=keep
    linux  /casper/vmlinuz ---
    initrd /casper/initrd
}
grub_platform
if [ "$grub_platform" = "efi" ]; then
menuentry 'Boot from next volume' {
    exit 1
}
menuentry 'UEFI Firmware Settings' {
    fwsetup
}
fi
